<!DOCTYPE html>
<html lang="ur">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aviator Ultimate | Professional Edition</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-red: #d11b3d;
            --primary-green: #28a745;
            --bg-dark: #090a0c;
            --card-bg: #1b1c21;
            --accent-blue: #2eff8e;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #000;
            position: relative;
        }

        /* Top Header */
        .game-header {
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #14151a;
            border-bottom: 1px solid #2d2e35;
        }

        .logo {
            color: var(--primary-red);
            font-weight: 900;
            font-size: 1.5rem;
            font-style: italic;
        }

        .balance-box {
            background: #000;
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid var(--primary-green);
            color: var(--primary-green);
            font-weight: bold;
        }

        /* History Bar */
        .history-bar {
            background: #050505;
            padding: 5px 10px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
        }

        .history-bar::-webkit-scrollbar {
            display: none;
        }

        .h-chip {
            background: #1b1c21;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: bold;
        }

        .h-chip.blue {
            color: #41b6ff;
        }

        .h-chip.purple {
            color: #913cff;
        }

        /* Game Stage (Canvas) */
        .stage-container {
            position: relative;
            flex: 1;
            min-height: 280px;
            background: radial-gradient(circle at center, #1a1b23 0%, #000 100%);
            overflow: hidden;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
        }

        #multiplier-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.5rem;
            font-weight: 900;
            z-index: 10;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        /* Betting Controls */
        .bet-section {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.5);
        }

        .bet-card {
            background: #14151a;
            border-radius: 15px;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #2d2e35;
        }

        .input-group-custom {
            background: #000;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 10px;
            border: 1px solid #333;
        }

        .input-group-custom input {
            background: transparent;
            border: none;
            color: white;
            text-align: center;
            font-weight: bold;
            width: 60px;
        }

        .circle-btn {
            width: 28px;
            height: 28px;
            background: #2d2e35;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
        }

        .bet-btn {
            width: 100%;
            height: 60px;
            border-radius: 15px;
            border: none;
            color: white;
            font-weight: 900;
            font-size: 1.2rem;
            background: var(--primary-green);
            box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.2);
            transition: 0.1s;
        }

        .bet-btn:active {
            transform: scale(0.98);
        }

        .bet-btn.cashout {
            background: var(--primary-red);
        }

        .btn-label {
            font-size: 10px;
            display: block;
            opacity: 0.8;
        }

        /* Animations */
        .flew-away {
            color: var(--primary-red) !important;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0% {
                transform: translate(-50%, -50%) rotate(0);
            }

            20% {
                transform: translate(-52%, -50%) rotate(-1deg);
            }

            40% {
                transform: translate(-48%, -50%) rotate(1deg);
            }

            100% {
                transform: translate(-50%, -50%) rotate(0);
            }
        }
    </style>
</head>

<body>

    <div class="app-container">
        <header class="game-header">
            <div class="logo">Aviator</div>
            <div class="balance-box">
                <span id="wallet">10,000.00</span> <small>PKR</small>
            </div>
        </header>

        <div class="history-bar" id="history">
            <span class="h-chip blue">1.25x</span>
            <span class="h-chip purple">10.4x</span>
            <span class="h-chip">2.10x</span>
            <span class="h-chip blue">1.05x</span>
        </div>

        <div class="stage-container">
            <div id="multiplier-text">1.00x</div>
            <canvas id="gameCanvas"></canvas>
        </div>

        <div class="bet-section">
            <div class="bet-card">
                <div class="row align-items-center">
                    <div class="col-5">
                        <div class="input-group-custom mb-2">
                            <div class="circle-btn" onclick="updateBet(-10)">−</div>
                            <input type="number" id="betAmt" value="100">
                            <div class="circle-btn" onclick="updateBet(10)">+</div>
                        </div>
                        <div class="d-flex justify-content-between">
                            <button class="btn btn-dark btn-sm py-0" style="font-size: 10px;"
                                onclick="setBet(200)">200</button>
                            <button class="btn btn-dark btn-sm py-0" style="font-size: 10px;"
                                onclick="setBet(500)">500</button>
                        </div>
                    </div>
                    <div class="col-7">
                        <button class="bet-btn" id="actionBtn" onclick="handleAction()">
                            <span class="btn-label">PLACE BET</span>
                            <span id="btnVal">100.00 PKR</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

    <script>
        // --- گیم کی بنیادی سیٹنگز ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const mText = document.getElementById('multiplier-text');
        const walletText = document.getElementById('wallet');
        const btn = document.getElementById('actionBtn');
        const label = btn.querySelector('.btn-label');
        const btnValDisplay = document.getElementById('btnVal');

        let wallet = 10000;
        let multiplier = 1.00;
        let isFlying = false;
        let isWaiting = false; // ٹائمر کے لیے
        let crashPoint = 0;
        let animationId;
        let startTime;
        let currentBet = 100;

        // کینوس کو اسکرین کے مطابق سیٹ کرنا
        function resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.onresize = resize;
        resize();

        // --- بیٹنگ فنکشنز ---
        function updateBet(val) {
            if (isFlying || isWaiting) return;
            let input = document.getElementById('betAmt');
            currentBet = Math.max(10, parseInt(input.value) + val);
            input.value = currentBet;
            btnValDisplay.innerText = currentBet + ".00 PKR";
        }

        function setBet(val) {
            if (isFlying || isWaiting) return;
            currentBet = val;
            document.getElementById('betAmt').value = val;
            btnValDisplay.innerText = val + ".00 PKR";
        }

        // --- مین گیم لاجک (گراف) ---
        function drawGraph() {
            if (!isFlying) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let elapsed = (Date.now() - startTime) / 1000;
            // ملٹی پلائر بڑھنے کی رفتار
            multiplier = 1 + (Math.pow(elapsed, 1.2) * 0.15);
            mText.innerText = multiplier.toFixed(2) + 'x';

            // چیک کریں کہ کیا جہاز کریش ہوا؟
            if (multiplier >= crashPoint) {
                triggerCrash();
                return;
            }

            let progress = Math.min(elapsed / 10, 0.85);
            const startX = 40;
            const startY = canvas.height - 40;
            const endX = startX + (progress * (canvas.width - 100));
            const endY = startY - (Math.pow(progress, 1.8) * (canvas.height - 100));

            // گراف کی لائن اور شیڈنگ
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.quadraticCurveTo(startX + (endX - startX) / 2, startY, endX, endY);

            let grad = ctx.createLinearGradient(0, endY, 0, startY);
            grad.addColorStop(0, 'rgba(209, 27, 61, 0.4)');
            grad.addColorStop(1, 'transparent');

            ctx.lineTo(endX, startY);
            ctx.fillStyle = grad;
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.quadraticCurveTo(startX + (endX - startX) / 2, startY, endX, endY);
            ctx.strokeStyle = '#d11b3d';
            ctx.lineWidth = 5;
            ctx.stroke();

            // جہاز (Emoji)
            ctx.font = "35px Arial";
            ctx.fillText("✈️", endX - 20, endY + 10);

            animationId = requestAnimationFrame(drawGraph);
        }

        // --- بٹن ایکشن (Bet/Cashout) ---
        function handleAction() {
            if (!isFlying && !isWaiting) {
                startNewRound();
            } else if (isFlying) {
                performCashout();
            }
        }

        function startNewRound() {
            let betInput = parseInt(document.getElementById('betAmt').value);
            if (wallet < betInput) {
                alert("بیلنس ناکافی ہے!");
                return;
            }

            // رقم کاٹنا
            wallet -= betInput;
            walletText.innerText = wallet.toFixed(2);
            currentBet = betInput;

            // سیٹنگز ری سیٹ
            isFlying = true;
            multiplier = 1.00;
            crashPoint = (1.0 + Math.random() * 4).toFixed(2); // 1.0 سے 5.0 کے درمیان رینڈم
            startTime = Date.now();

            // UI اپ ڈیٹ
            btn.classList.add('cashout');
            label.innerText = "CASHOUT";
            mText.style.color = "white";
            mText.style.fontSize = "3.5rem";

            drawGraph();
        }

        function performCashout() {
            isFlying = false;
            let win = currentBet * multiplier;
            wallet += win;
            walletText.innerText = wallet.toFixed(2);

            mText.innerText = multiplier.toFixed(2) + "x";
            mText.style.color = "#2eff8e"; // سبز رنگ (جیت)

            updateHistory(multiplier.toFixed(2));
            cancelAnimationFrame(animationId);
            startWaitingTimer(5);
        }

        function triggerCrash() {
            isFlying = false;
            cancelAnimationFrame(animationId);

            mText.innerText = "FLEW AWAY!";
            mText.style.color = "#ff4b2b"; // سرخ رنگ (ہار)

            updateHistory(multiplier.toFixed(2));
            startWaitingTimer(5);
        }

        // --- 5 سیکنڈ کا ٹائمر ---
        function startWaitingTimer(seconds) {
            isWaiting = true;
            let timeLeft = seconds;

            // بٹن کو لاک کرنا
            btn.disabled = true;
            btn.style.background = "#333";
            btn.style.opacity = "0.7";
            label.innerText = "WAITING";

            let timerInterval = setInterval(() => {
                mText.innerText = "Next Round in " + timeLeft + "s";
                mText.style.fontSize = "1.5rem";
                mText.style.color = "#aaa";

                timeLeft--;

                if (timeLeft < 0) {
                    clearInterval(timerInterval);
                    isWaiting = false;
                    resetUIForNewRound();
                }
            }, 1000);
        }

        function resetUIForNewRound() {
            btn.disabled = false;
            btn.style.background = "var(--primary-green)";
            btn.style.opacity = "1";
            btn.classList.remove('cashout');
            label.innerText = "PLACE BET";
            btnValDisplay.innerText = document.getElementById('betAmt').value + ".00 PKR";

            mText.innerText = "1.00x";
            mText.style.fontSize = "3.5rem";
            mText.style.color = "white";

            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function updateHistory(val) {
            const historyDiv = document.getElementById('history');
            const chip = document.createElement('span');
            chip.className = `h-chip ${val >= 2 ? 'purple' : 'blue'}`;
            chip.innerText = val + "x";
            historyDiv.prepend(chip);
            if (historyDiv.children.length > 12) historyDiv.lastChild.remove();
        }
    </script>
</body>

</html>
