<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>No777 | Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-gold: #ffb800;
            --dark-bg: #0f1012;
            --card-bg: #1c1e22;
            --text-gray: #9ba3af;
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            min-height: 100vh;
        }

        .promo-banner {
            text-align: center;
            font-size: 13px;
            margin-bottom: 25px;
        }

        .highlight {
            color: #00ff00;
            font-weight: bold;
        }

        .auth-tabs {
            display: flex;
            border-bottom: 1px solid #2d2f34;
            margin-bottom: 25px;
        }

        .tab-item {
            flex: 1;
            text-align: center;
            padding: 12px;
            text-decoration: none;
            color: var(--text-gray);
            font-weight: 600;
        }

        .tab-item.active {
            color: var(--primary-gold);
            border-bottom: 3px solid var(--primary-gold);
        }

        .custom-input-group {
            background: var(--card-bg);
            border: 1px solid #2d2f34;
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 15px;
        }

        .custom-input-group input {
            background: transparent;
            border: none;
            color: #fff;
            width: 100%;
            outline: none;
            font-size: 14px;
            margin-left: 10px;
        }

        .helper-text {
            color: var(--primary-gold);
            font-size: 11px;
            margin-top: -10px;
            margin-bottom: 15px;
            display: block;
        }

        .btn-register {
            background: linear-gradient(to bottom, #f7d37d, #d4a017);
            color: #000;
            width: 100%;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 800;
            margin-top: 10px;
        }

        .google-icon {
            width: 45px;
            height: 45px;
            background: #fff;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="auth-wrapper">
        <div class="promo-banner">Free bonus for <span class="highlight">Rs 777</span><br>Invite 1 person And get a reward of <span class="highlight">Rs 5,000</span></div>
        <div class="auth-tabs">
            <a href="#" class="tab-item active">Register</a>
            <a href="{{ url('/login') }}" class="tab-item">Login</a>
        </div>
        <form action="#" method="POST">
            <label class="small mb-2">Support Phone number/Profile Register</label>
            <div class="custom-input-group"><i class="fa-solid fa-user text-secondary"></i><input type="text" placeholder="Please enter Phone number/Profile"></div>
            <div class="custom-input-group"><i class="fa-solid fa-lock text-secondary"></i><input type="password" placeholder="Enter password"></div>
            <div class="custom-input-group"><i class="fa-solid fa-lock text-secondary"></i><input type="password" placeholder="Enter password again"></div>
            <div class="custom-input-group"><i class="fa-solid fa-id-card text-secondary"></i><input type="text" placeholder="Please enter your real name"></div>
            <span class="helper-text">Must have the same name as your withdrawal bank account</span>
            <div class="form-check small mb-3"><input class="form-check-input" type="checkbox" checked> I am over 18 years old, I agree to <a href="#" class="text-warning text-decoration-none">User Agreement</a></div>
            <button type="submit" class="btn-register">Register</button>
        </form>
        <div class="text-center mt-4 pt-3 border-top border-secondary">
            <p class="small text-secondary mb-2">Binding registration</p>
            <div class="google-icon"><img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="25"></div>
        </div>
    </div>
</body>

</html>
