<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>No777 | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-gold: #ffb800;
            --dark-bg: #0f1012;
            --card-bg: #1c1e22;
            --text-gray: #9ba3af;
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            min-height: 100vh;
        }

        .auth-header {
            text-align: center;
            margin: 40px 0;
        }

        .auth-header h1 {
            color: var(--primary-gold);
            font-weight: 800;
            font-size: 32px;
            margin: 0;
        }

        .auth-tabs {
            display: flex;
            border-bottom: 1px solid #2d2f34;
            margin-bottom: 30px;
        }

        .tab-item {
            flex: 1;
            text-align: center;
            padding: 12px;
            text-decoration: none;
            color: var(--text-gray);
            font-weight: 600;
        }

        .tab-item.active {
            color: var(--primary-gold);
            border-bottom: 3px solid var(--primary-gold);
        }

        .custom-input-group {
            background: var(--card-bg);
            border: 1px solid #2d2f34;
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 20px;
        }

        .custom-input-group input {
            background: transparent;
            border: none;
            color: #fff;
            width: 100%;
            outline: none;
            font-size: 14px;
            margin-left: 10px;
        }

        .btn-login {
            background: linear-gradient(to bottom, #f7d37d, #d4a017);
            color: #000;
            width: 100%;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 800;
        }

        .google-icon {
            width: 45px;
            height: 45px;
            background: #fff;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-header">
            <h1>No777</h1>
            <p class="small text-secondary">Sign in to continue</p>
        </div>
        <div class="auth-tabs">
            <a href="#" class="tab-item active">Login</a>
            <a href="{{ url('/register') }}" class="tab-item">Register</a>
        </div>
        <form action="#" method="POST">
            <label class="small mb-2">Phone Number / Account</label>
            <div class="custom-input-group"><i class="fa-solid fa-phone text-secondary"></i><input type="text" placeholder="Enter your phone number"></div>
            <label class="small mb-2">Password</label>
            <div class="custom-input-group"><i class="fa-solid fa-lock text-secondary"></i><input type="password" placeholder="Enter your password"></div>
            <div class="d-flex justify-content-between small mb-4"><label><input type="checkbox"> Remember me</label><a href="#" class="text-warning text-decoration-none">Forgot Password?</a></div>
            <button type="submit" class="btn-login">Login</button>
        </form>
        <div class="text-center mt-5 pt-3 border-top border-secondary">
            <p class="small text-secondary mb-2">Login with social account</p>
            <div class="google-icon"><img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="25"></div>
        </div>
    </div>
</body>

</html>
