<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>No777 | Professional Gaming Platform</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --gold-gradient: linear-gradient(135deg, #ffcc00 0%, #ff9500 100%);
            --primary-gold: #ffb800;
            --dark-body: #0a0b0c;
            --dark-card: #16181c;
            --border-color: rgba(255, 215, 0, 0.1);
            --glass: rgba(255, 255, 255, 0.03);
            --container-max-width: 1200px;
        }

        body {
            background: var(--dark-body);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding-bottom: 100px;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- Global Container for Desktop Centering --- */
        .main-wrapper {
            max-width: var(--container-max-width);
            margin: 0 auto;
            position: relative;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* --- Responsive Header --- */
        .header {
            background: rgba(10, 11, 12, 0.9);
            backdrop-filter: blur(20px);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1050;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-size: clamp(20px, 5vw, 26px);
            font-weight: 800;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .btn-reg {
            background: var(--gold-gradient);
            color: #000;
            font-size: 13px;
            font-weight: 700;
            padding: 8px 16px;
            border-radius: 10px;
            text-decoration: none;
            transition: 0.3s;
        }

        /* --- Banner Section --- */
        .banner-container {
            padding: 15px;
        }

        .promo-card {
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            position: relative;
        }

        .promo-card img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* --- Categories (Scrollable on Mobile, Grid on Desktop) --- */
        .categories-wrapper {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding: 15px;
        }

        .cat-item {
            background: var(--dark-card);
            min-width: 80px;
            flex: 0 0 auto;
            padding: 12px 5px;
            border-radius: 15px;
            text-align: center;
            text-decoration: none;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .cat-item.active {
            background: rgba(255, 184, 0, 0.1);
            border-color: var(--primary-gold);
        }

        .cat-item i {
            font-size: 20px;
            color: #666;
            display: block;
            margin-bottom: 5px;
        }

        .cat-item.active i {
            color: var(--primary-gold);
        }

        .cat-item span {
            font-size: 11px;
            color: #888;
            font-weight: 600;
        }

        .cat-item.active span {
            color: #fff;
        }

        /* --- Responsive Game Grid (The Core Part) --- */
        .game-grid {
            display: grid;
            padding: 0 15px;
            gap: 12px;
            /* Default: 2 columns for small mobile */
            grid-template-columns: repeat(2, 1fr);
        }

        /* Responsive Breakpoints */
        @media (min-width: 480px) {
            .game-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 768px) {
            .game-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (min-width: 992px) {
            .game-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        @media (min-width: 1200px) {
            .game-grid {
                grid-template-columns: repeat(6, 1fr);
            }
        }

        .game-card {
            background: var(--dark-card);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            text-decoration: none;
            transition: transform 0.2s;
        }

        .game-card:active {
            transform: scale(0.95);
        }

        .game-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
        }

        .game-footer {
            padding: 8px 5px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9), transparent);
            position: absolute;
            bottom: 0;
            width: 100%;
            font-size: 10px;
            font-weight: 700;
            text-align: center;
            color: #fff;
            text-transform: uppercase;
        }

        .hot-tag {
            position: absolute;
            top: 8px;
            left: 8px;
            background: #ff3b30;
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 800;
            color: #fff;
            z-index: 5;
        }

        /* --- Bottom Nav (Sticky only for Mobile) --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: var(--container-max-width);
            background: rgba(22, 24, 28, 0.95);
            backdrop-filter: blur(15px);
            display: flex;
            padding: 10px 0 25px;
            border-top: 1px solid var(--border-color);
            z-index: 1000;
        }

        .nav-item {
            flex: 1;
            text-align: center;
            color: #666;
            text-decoration: none;
        }

        .nav-item.active {
            color: var(--primary-gold);
        }

        .nav-item i {
            font-size: 20px;
            display: block;
            margin-bottom: 3px;
        }

        .nav-item span {
            font-size: 10px;
            font-weight: 600;
        }

        /* WhatsApp Button Responsive Position */
        .wa-btn {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: #25d366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            text-decoration: none;
        }

        /* Desktop Adjustments */
        @media (min-width: 1024px) {
            .categories-wrapper {
                justify-content: center;
                overflow: hidden;
            }

            .wa-btn {
                right: calc(50% - 600px);
            }

            /* Stay near container on desktop */
        }
    </style>
</head>

<body>

        <div class="px-3 py-2 d-flex justify-content-between align-items-center">

        <div class="game-grid">
            <a href="aviator.html" class="game-card">

            </a>

            <a href="#" class="game-card">

            <a href="#" class="game-card">

            <a href="#" class="game-card">

        <nav class="bottom-nav">

            <a href="#" class="nav-item"><i class="fa-solid fa-user"></i><span>Profile</span></a>
        </nav>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
